name: Rotate Scratch Org

on:
  schedule: 
    - cron: '0 0 * * 0'
  workflow_dispatch:

jobs:
  rotate:
    name: Replace scratch org
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Dev Hub auth uses a Connected App (required for scratch org creation)
      # See: https://developer.salesforce.com/docs/atlas.en-us.sfdx_dev.meta/sfdx_dev/sfdx_dev_auth_connected_app.htm
      - name: Auth to Dev Hub
        uses: ./
        with:
          consumer-key: ${{ secrets.SF_CONSUMER_KEY_DEVHUB }}
          jwt-private-key: ${{ secrets.SF_JWT_PRIVATE_KEY_PROD }}
          username: ${{ secrets.SF_USERNAME_PROD }}
          instance-url: https://login.salesforce.com
          org-alias: devhub

      - name: Auth to existing scratch org
        uses: ./
        with:
          consumer-key: ${{ secrets.SF_CONSUMER_KEY_SANDBOX }}
          jwt-private-key: ${{ secrets.SF_JWT_PRIVATE_KEY_SANDBOX }}
          username: ${{ secrets.SF_USERNAME_SANDBOX }}
          org-alias: old-scratch

      - name: Retrieve ECA from existing scratch org
        run: |
          set -euo pipefail
          sf project generate --name MyProject
          cd MyProject
          sf project retrieve start \
            --manifest ../manifest/package-eca-all.xml \
            --target-org old-scratch \
            > /dev/null 2>&1

      - name: Restore Dev Hub private key for scratch org creation
        env:
          JWT_KEY: ${{ secrets.SF_JWT_PRIVATE_KEY_PROD }}
        run: |
          set -euo pipefail
          echo "$JWT_KEY" > "$RUNNER_TEMP/server.key" 2>/dev/null
          chmod 600 "$RUNNER_TEMP/server.key"

      - name: Create new scratch org
        run: |
          set -euo pipefail
          cd MyProject
          SCRATCH_OUTPUT=$(sf org create scratch \
            --definition-file config/project-scratch-def.json \
            --target-dev-hub devhub \
            --alias new-scratch \
            --duration-days 8 \
            --set-default \
            --release preview \
            --json)
          NEW_USERNAME=$(echo "$SCRATCH_OUTPUT" | jq -r '.result.username')
          if [ -z "$NEW_USERNAME" ] || [ "$NEW_USERNAME" = "null" ]; then
            echo "Failed to create scratch org: $(echo "$SCRATCH_OUTPUT" | jq -r '.message // .result.message // "unknown error"')"
            exit 1
          fi
          echo "::add-mask::$NEW_USERNAME"
          echo "new_username=$NEW_USERNAME" >> $GITHUB_ENV

      - name: Strip org-specific fields before deploy
        run: |
          set -euo pipefail
          find MyProject/force-app -name "*.externalClientApp-meta.xml" \
            -exec sed -i '/<orgScopedExternalApp>/d' {} + \
            > /dev/null 2>&1
          find MyProject/force-app -name "*.ecaOauth-meta.xml" \
            -exec sed -i '/<oauthLink>/d' {} + \
            > /dev/null 2>&1

      - name: Deploy ECA to new scratch org
        run: |
          set -euo pipefail
          cd MyProject
          sf project deploy start \
            --manifest ../manifest/package-eca-all.xml \
            --target-org new-scratch \
            > /dev/null 2>&1

      - name: Get new consumer key
        run: |
          set -euo pipefail
          cd MyProject
          sf project retrieve start \
            --manifest ../manifest/package-eca-consumer-key.xml \
            --target-org new-scratch \
            > /dev/null 2>&1
          ECA_FILE=$(find force-app -name "*.ecaGlblOauth-meta.xml" | head -1)
          NEW_CONSUMER_KEY=$(grep -oP '(?<=<consumerKey>)[^<]+' "$ECA_FILE")
          echo "::add-mask::$NEW_CONSUMER_KEY"
          echo "new_consumer_key=$NEW_CONSUMER_KEY" >> $GITHUB_ENV

      - name: Update GitHub secrets
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          set -euo pipefail
          NEW_SFDX_AUTH_URL=$(sf org display --target-org new-scratch --verbose --json \
            | jq -r '.result.sfdxAuthUrl // empty')
          if [[ -z "$NEW_SFDX_AUTH_URL" ]] || [[ ! "$NEW_SFDX_AUTH_URL" =~ ^force:// ]]; then
            echo "Error (Rotate Scratch Org): Failed to retrieve a valid SFDX auth URL for the new scratch org."
            echo "The SF_SFDX_AUTH_URL secret was NOT updated. Re-run the 'Rotate Scratch Org' workflow once the issue is resolved."
            exit 1
          fi
          echo "::add-mask::$NEW_SFDX_AUTH_URL"
          echo "${{ env.new_username }}" | gh secret set SF_USERNAME_SANDBOX --repo ${{ github.repository }} > /dev/null 2>&1
          echo "${{ env.new_consumer_key }}" | gh secret set SF_CONSUMER_KEY_SANDBOX --repo ${{ github.repository }} > /dev/null 2>&1
          echo "$NEW_SFDX_AUTH_URL" | gh secret set SF_SFDX_AUTH_URL --repo ${{ github.repository }} > /dev/null 2>&1

      - name: Delete old scratch org
        run: |
          cd MyProject
          sf org delete scratch --target-org old-scratch --no-prompt > /dev/null 2>&1
