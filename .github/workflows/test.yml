name: Test sf-auth action

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  validate:
    name: Validate action YAML
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install action-validator
        run: npm install -g @action-validator/cli

      - name: Validate action.yml
        run: action-validator action.yml

  test-invalid-url:
    name: Negative test - invalid instance URL
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Should fail on http:// URL
        id: should-fail
        continue-on-error: true
        uses: ./
        with:
          consumer-key: fake-key
          jwt-private-key: fake-key
          username: fake@fake.com
          instance-url: http://login.salesforce.com

      - name: Assert step failed
        shell: bash
        run: |
          if [ "${{ steps.should-fail.outcome }}" != "failure" ]; then
            echo "Expected action to fail on http:// URL but it did not"
            exit 1
          fi
          echo "Correctly rejected invalid instance URL"

  check-secrets-sandbox:
    name: Check sandbox secrets
    runs-on: ubuntu-latest
    outputs:
      has-secrets: ${{ steps.check.outputs.has-secrets }}
    steps:
      - id: check
        env:
          SECRET: ${{ secrets.SF_CONSUMER_KEY_SANDBOX }}
        run: |
          if [ -n "$SECRET" ]; then
            echo "has-secrets=true" >> $GITHUB_OUTPUT
          else
            echo "has-secrets=false" >> $GITHUB_OUTPUT
          fi

  check-secrets-prod:
    name: Check production secrets
    runs-on: ubuntu-latest
    outputs:
      has-secrets: ${{ steps.check.outputs.has-secrets }}
    steps:
      - id: check
        env:
          SECRET: ${{ secrets.SF_CONSUMER_KEY_PROD }}
        run: |
          if [ -n "$SECRET" ]; then
            echo "has-secrets=true" >> $GITHUB_OUTPUT
          else
            echo "has-secrets=false" >> $GITHUB_OUTPUT
          fi
    
  check-secrets-mydomain:
    name: Check mydomain url secret
    runs-on: ubuntu-latest
    outputs:
      has-secrets: ${{ steps.check.outputs.has-secrets }}
    steps:
      - id: check
        env:
          SECRET: ${{ secrets.SF_INSTANCE_URL_MYDOMAIN }}
        run: |
          if [ -n "$SECRET" ]; then
            echo "has-secrets=true" >> $GITHUB_OUTPUT
          else
            echo "has-secrets=false" >> $GITHUB_OUTPUT
          fi

  integration-sandbox:
    name: Integration test - sandbox (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    needs: check-secrets-sandbox
    if: needs.check-secrets-sandbox.outputs.has-secrets == 'true'
    steps:
      - uses: actions/checkout@v4

      - id: sf-auth
        uses: ./
        with:
          consumer-key: ${{ secrets.SF_CONSUMER_KEY_SANDBOX }}
          jwt-private-key: ${{ secrets.SF_JWT_PRIVATE_KEY_SANDBOX }}
          username: ${{ secrets.SF_USERNAME_SANDBOX }}
          org-alias: test-sandbox
          get-org-type: 'true'

      - name: Verify authenticated org
        shell: bash
        run: sf data query --query "SELECT Name FROM Account LIMIT 1" --target-org ${{ steps.sf-auth.outputs.org-alias }}

      - name: Verify org-alias output matches input
        shell: bash
        run: |
          if [ "${{ steps.sf-auth.outputs.org-alias }}" != "test-sandbox" ]; then
            echo "Expected org-alias 'test-sandbox', got '${{ steps.sf-auth.outputs.org-alias }}'"
            exit 1
          fi

      - name: Verify outputs
        shell: bash
        run: |
          [[ ! "${{ steps.sf-auth.outputs.org-id }}" =~ ^00D ]] && echo "org-id does not start with 00D: ${{ steps.sf-auth.outputs.org-id }}" && exit 1
          [ "${{ steps.sf-auth.outputs.type }}" != "Scratch" ] && echo "Expected type 'Scratch', got '${{ steps.sf-auth.outputs.type }}'" && exit 1
          [[ ! "${{ steps.sf-auth.outputs.my-domain-url }}" =~ ^https:// ]] && echo "my-domain-url is invalid" && exit 1
          [ "${{ steps.sf-auth.outputs.release-version }}" -lt 260 ] && echo "release-version seems invalid: ${{ steps.sf-auth.outputs.release-version }}" && exit 1
          echo "org-id: ${{ steps.sf-auth.outputs.org-id }}"
          echo "type: ${{ steps.sf-auth.outputs.type }}"
          echo "my-domain-url: ${{ steps.sf-auth.outputs.my-domain-url }}"
          echo "release-version: ${{ steps.sf-auth.outputs.release-version }}"

      - name: Verify private key was deleted
        if: always()
        shell: bash
        run: |
          if [ -f "$RUNNER_TEMP/server.key" ]; then
            echo "Private key was not cleaned up"
            exit 1
          fi
          echo "Private key correctly removed"

      - name: Get auth URL from authenticated org
        id: get-auth-url
        shell: bash
        run: |
          set -euo pipefail
          AUTH_URL=$(sf org display --target-org test-sandbox --verbose --json \
            | jq -r '.result.sfdxAuthUrl')
          if [ -z "$AUTH_URL" ] || [ "$AUTH_URL" = "null" ]; then
            echo "Failed to retrieve sfdxAuthUrl from org"
            exit 1
          fi
          echo "::add-mask::$AUTH_URL"
          echo "auth-url=$AUTH_URL" >> $GITHUB_OUTPUT

      - name: Test auth-url method
        id: sf-auth-url
        uses: ./
        with:
          auth-method: auth-url
          sfdx-auth-url: ${{ steps.get-auth-url.outputs.auth-url }}
          org-alias: test-sandbox-authurl

      - name: Verify auth-url authenticated org
        shell: bash
        run: |
          set -euo pipefail
          sf data query --query "SELECT Name FROM Account LIMIT 1" --target-org test-sandbox-authurl

      - name: Verify auth-url org-alias output
        shell: bash
        run: |
          if [ "${{ steps.sf-auth-url.outputs.org-alias }}" != "test-sandbox-authurl" ]; then
            echo "Expected org-alias 'test-sandbox-authurl', got '${{ steps.sf-auth-url.outputs.org-alias }}'"
            exit 1
          fi
          echo "org-alias output correctly set"

  integration-sandbox-pinned-version:
    name: Integration test - sandbox pinned (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    needs: check-secrets-sandbox
    if: needs.check-secrets-sandbox.outputs.has-secrets == 'true'
    steps:
      - uses: actions/checkout@v4

      - id: sf-auth
        uses: ./
        with:
          consumer-key: ${{ secrets.SF_CONSUMER_KEY_SANDBOX }}
          jwt-private-key: ${{ secrets.SF_JWT_PRIVATE_KEY_SANDBOX }}
          username: ${{ secrets.SF_USERNAME_SANDBOX }}
          sf-cli-version: 2.50.6
          org-alias: test-sandbox-pinned
          get-org-type: 'true'

      - name: Verify CLI version
        shell: bash
        run: sf --version | grep "@salesforce/cli/2.50.6"

      - name: Verify authenticated org
        shell: bash
        run: sf data query --query "SELECT Name FROM Account LIMIT 1" --target-org ${{ steps.sf-auth.outputs.org-alias }}

      - name: Verify outputs
        shell: bash
        run: |
          [[ ! "${{ steps.sf-auth.outputs.org-id }}" =~ ^00D ]] && echo "org-id does not start with 00D: ${{ steps.sf-auth.outputs.org-id }}" && exit 1
          [ "${{ steps.sf-auth.outputs.type }}" != "Scratch" ] && echo "Expected type 'Scratch', got '${{ steps.sf-auth.outputs.type }}'" && exit 1
          [[ ! "${{ steps.sf-auth.outputs.my-domain-url }}" =~ ^https:// ]] && echo "my-domain-url is invalid" && exit 1
          [ "${{ steps.sf-auth.outputs.release-version }}" -lt 260 ] && echo "release-version seems invalid: ${{ steps.sf-auth.outputs.release-version }}" && exit 1
          echo "org-id: ${{ steps.sf-auth.outputs.org-id }}"
          echo "type: ${{ steps.sf-auth.outputs.type }}"
          echo "my-domain-url: ${{ steps.sf-auth.outputs.my-domain-url }}"
          echo "release-version: ${{ steps.sf-auth.outputs.release-version }}"

      - name: Verify private key was deleted
        if: always()
        shell: bash
        run: |
          if [ -f "$RUNNER_TEMP/server.key" ]; then
            echo "Private key was not cleaned up"
            exit 1
          fi
          echo "Private key correctly removed"

  integration-production:
    name: Integration test - production (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    needs: check-secrets-prod
    if: needs.check-secrets-prod.outputs.has-secrets == 'true'
    steps:
      - uses: actions/checkout@v4

      - id: sf-auth
        uses: ./
        with:
          consumer-key: ${{ secrets.SF_CONSUMER_KEY_PROD }}
          jwt-private-key: ${{ secrets.SF_JWT_PRIVATE_KEY_PROD }}
          username: ${{ secrets.SF_USERNAME_PROD }}
          instance-url: https://login.salesforce.com
          org-alias: test-prod
          get-org-type: 'true'

      - name: Verify authenticated org
        shell: bash
        run: sf data query --query "SELECT Name FROM Account LIMIT 1" --target-org ${{ steps.sf-auth.outputs.org-alias }}

      - name: Verify outputs
        shell: bash
        run: |
          [[ ! "${{ steps.sf-auth.outputs.org-id }}" =~ ^00D ]] && echo "org-id does not start with 00D: ${{ steps.sf-auth.outputs.org-id }}" && exit 1
          [ "${{ steps.sf-auth.outputs.type }}" != "Production" ] && echo "Expected type 'Production', got '${{ steps.sf-auth.outputs.type }}'" && exit 1
          [[ ! "${{ steps.sf-auth.outputs.my-domain-url }}" =~ ^https:// ]] && echo "my-domain-url is invalid" && exit 1
          [ "${{ steps.sf-auth.outputs.release-version }}" -lt 260 ] && echo "release-version seems invalid: ${{ steps.sf-auth.outputs.release-version }}" && exit 1
          echo "org-id: ${{ steps.sf-auth.outputs.org-id }}"
          echo "type: ${{ steps.sf-auth.outputs.type }}"
          echo "my-domain-url: ${{ steps.sf-auth.outputs.my-domain-url }}"
          echo "release-version: ${{ steps.sf-auth.outputs.release-version }}"

      - name: Verify private key was deleted
        if: always()
        shell: bash
        run: |
          if [ -f "$RUNNER_TEMP/server.key" ]; then
            echo "Private key was not cleaned up"
            exit 1
          fi
          echo "Private key correctly removed"

  integration-mydomain:
    name: Integration test - My Domain (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    needs: check-secrets-mydomain
    if: needs.check-secrets-mydomain.outputs.has-secrets == 'true'
    steps:
      - uses: actions/checkout@v4

      - id: sf-auth
        uses: ./
        with:
          consumer-key: ${{ secrets.SF_CONSUMER_KEY_PROD }}
          jwt-private-key: ${{ secrets.SF_JWT_PRIVATE_KEY_PROD }}
          username: ${{ secrets.SF_USERNAME_PROD }}
          instance-url: ${{ secrets.SF_INSTANCE_URL_MYDOMAIN }}
          org-alias: test-mydomain
          get-org-type: 'true'

      - name: Verify authenticated org
        shell: bash
        run: sf data query --query "SELECT Name FROM Account LIMIT 1" --target-org ${{ steps.sf-auth.outputs.org-alias }}

      - name: Verify outputs
        shell: bash
        run: |
          [[ ! "${{ steps.sf-auth.outputs.org-id }}" =~ ^00D ]] && echo "org-id does not start with 00D: ${{ steps.sf-auth.outputs.org-id }}" && exit 1
          [[ ! "${{ steps.sf-auth.outputs.my-domain-url }}" =~ ^https:// ]] && echo "my-domain-url is invalid" && exit 1
          [ "${{ steps.sf-auth.outputs.release-version }}" -lt 260 ] && echo "release-version seems invalid: ${{ steps.sf-auth.outputs.release-version }}" && exit 1
          echo "org-id: ${{ steps.sf-auth.outputs.org-id }}"
          echo "type: ${{ steps.sf-auth.outputs.type }}"
          echo "my-domain-url: ${{ steps.sf-auth.outputs.my-domain-url }}"
          echo "release-version: ${{ steps.sf-auth.outputs.release-version }}"

      - name: Verify private key was deleted
        if: always()
        shell: bash
        run: |
          if [ -f "$RUNNER_TEMP/server.key" ]; then
            echo "Private key was not cleaned up"
            exit 1
          fi
          echo "Private key correctly removed"
