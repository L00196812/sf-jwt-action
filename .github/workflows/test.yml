name: Test sf-auth action

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    name: Validate action YAML
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install action-validator
        run: npm install -g @action-validator/cli

      - name: Validate action.yml
        run: action-validator .github/actions/sf-auth/action.yml

  check-secrets:
    name: Check secrets availability
    runs-on: ubuntu-latest
    outputs:
      has-secrets: ${{ steps.check.outputs.has-secrets }}
    steps:
      - id: check
        run: |
          if [ -n "${{ secrets.SF_CONSUMER_KEY }}" ]; then
            echo "has-secrets=true" >> $GITHUB_OUTPUT
          else
            echo "has-secrets=false" >> $GITHUB_OUTPUT
          fi

  integration:
    name: Integration test
    runs-on: ubuntu-latest
    needs: check-secrets
    if: needs.check-secrets.outputs.has-secrets == 'true'
    steps:
      - uses: actions/checkout@v4

      - id: sf-auth
        uses: ./.github/actions/sf-auth
        with:
          consumer-key: ${{ secrets.SF_CONSUMER_KEY }}
          jwt-private-key: ${{ secrets.SF_JWT_PRIVATE_KEY }}
          username: ${{ secrets.SF_USERNAME }}
          instance-url: ${{ secrets.SF_INSTANCE_URL }}

      - name: Verify authenticated org
        run: sf org display --target-org ${{ steps.sf-auth.outputs.org-alias }}
